name: Auto-Update AI Job Data

on:
  schedule:
    # Runs every Monday and Thursday at 8 AM UTC
    - cron: '0 8 * * 1,4'
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run auto-updater
        run: cd scripts && node update-data.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js script.js
          git commit -m "Auto-update: new AI job loss entries added [$(date +%Y-%m-%d)]"
          git push
